name: deploy portofolio on aws ec2

on:
  push:
    branches: [main]
  
jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: checkout code
        uses: actions/checkout@v3
      
      - name: Install nodejs
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build the app
        run: npm run build
      
      - name: stop old container
        run: |
           docker stop react-app || true
           docker rm react-app || true
      
      - name: Build the docker image
        run: docker build -t react-app .
      
      - name: start the container
        run: docker run -d -p 3000:3000 --name react-app react-app